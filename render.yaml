services:
  - type: web
    name: film-investor-backend
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    port: 10000
    healthCheckPath: /health
    startupTimeout: 360
    envVars:
      - key: PORT
        value: "10000"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: HF_HUB_DISABLE_TELEMETRY
        value: "1"
